<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse-Wheel-Scroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Mouse Wheel Interaction Demo</h1>
    <hr>
    <p>Scroll your mouse wheel inside container.</p>
    <ul>
      <h3>Concepts Used: </h3>
      <li>wheel event</li>
      <li>transform translateY</li>
      <li>overflow hidden</li>
      <li>boundary reset logic</li>
      <li>bi-directional movement</li>
    </ul>
    <div class="mouseWheelContainer" id="mouseWheelContainer">
      <div class="mouseWheelBox" id="mouseWheelBox"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
